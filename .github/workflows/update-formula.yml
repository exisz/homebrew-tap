name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract info
        id: info
        run: |
          FORMULA="${{ github.event.client_payload.formula }}"
          VERSION="${{ github.event.client_payload.version }}"
          VERSION_NUM="${VERSION#v}"
          echo "formula=$FORMULA" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_num=$VERSION_NUM" >> $GITHUB_OUTPUT

      - name: Get source tarball SHA256
        id: sha
        run: |
          FORMULA="${{ steps.info.outputs.formula }}"
          VERSION="${{ steps.info.outputs.version }}"
          # Map formula name to repo (add more as needed)
          case "$FORMULA" in
            agent-git) REPO="exisz/agent-git" ;;
            *) echo "Unknown formula: $FORMULA"; exit 1 ;;
          esac
          SHA=$(curl -sL "https://github.com/${REPO}/archive/refs/tags/${VERSION}.tar.gz" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT

      - name: Update formula file
        run: |
          FORMULA="${{ steps.info.outputs.formula }}"
          VERSION="${{ steps.info.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          REPO="${{ steps.sha.outputs.repo }}"
          FILE="Formula/${FORMULA}.rb"

          # Update url and sha256 in-place
          sed -i "s|url \"https://github.com/${REPO}/archive/refs/tags/.*\"|url \"https://github.com/${REPO}/archive/refs/tags/${VERSION}.tar.gz\"|" "$FILE"
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" "$FILE"

          cat "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump ${{ steps.info.outputs.formula }} to ${{ steps.info.outputs.version_num }}"
          git push
